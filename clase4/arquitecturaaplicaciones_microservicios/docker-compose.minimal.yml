services:

  config-server:
    build:
      context: .
      dockerfile: config-server/Dockerfile
    ports:
      - "8888:8888"
    environment:
      SPRING_PROFILES_ACTIVE: native
      JAVA_TOOL_OPTIONS: >-
        -XX:+UseSerialGC
        -XX:MaxRAMPercentage=75.0
        -Xss256k
        -XX:TieredStopAtLevel=1
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "-O", "/dev/null", "http://localhost:8888/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 40s
    deploy:
      resources:
        limits:
          memory: 256m

  eureka-server:
    build:
      context: .
      dockerfile: eureka-server/Dockerfile
    ports:
      - "8761:8761"
    environment:
      EUREKA_INSTANCE_HOSTNAME: eureka-server
      JAVA_TOOL_OPTIONS: >-
        -XX:+UseSerialGC
        -XX:MaxRAMPercentage=75.0
        -Xss256k
        -XX:TieredStopAtLevel=1
    depends_on:
      config-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "-O", "/dev/null", "http://localhost:8761/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 40s
    deploy:
      resources:
        limits:
          memory: 256m

  auth-service:
    build:
      context: .
      dockerfile: auth-service/Dockerfile
    ports:
      - "8083:8083"
    environment:
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
      EUREKA_INSTANCE_PREFER_IP_ADDRESS: "true"
      JAVA_TOOL_OPTIONS: >-
        -XX:+UseSerialGC
        -XX:MaxRAMPercentage=75.0
        -Xss256k
        -XX:TieredStopAtLevel=1
    depends_on:
      config-server:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 384m

  inventory-service:
    build:
      context: .
      dockerfile: inventory-service/Dockerfile
    ports:
      - "8082:8082"
    environment:
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
      EUREKA_INSTANCE_PREFER_IP_ADDRESS: "true"
      JAVA_TOOL_OPTIONS: >-
        -XX:+UseSerialGC
        -XX:MaxRAMPercentage=75.0
        -Xss256k
        -XX:TieredStopAtLevel=1
    depends_on:
      config-server:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 384m

  api-gateway:
    build:
      context: .
      dockerfile: api-gateway/Dockerfile
    ports:
      - "8080:8080"
    environment:
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
      EUREKA_INSTANCE_PREFER_IP_ADDRESS: "true"
      JAVA_TOOL_OPTIONS: >-
        -XX:+UseSerialGC
        -XX:MaxRAMPercentage=75.0
        -Xss256k
        -XX:TieredStopAtLevel=1
    depends_on:
      config-server:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 384m
